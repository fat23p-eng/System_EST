<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>รวมระบบงาน กจส. – สำนักงานส่งเสริมสหกรณ์กรุงเทพมหานคร พื้นที่ 1</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0d2137;
  --navy2:#163351;
  --navy3:#1e4976;
  --blue:#2563a8;
  --sky:#3b82d4;
  --gold:#c9963a;
  --gold2:#e8b84b;
  --cream:#fdf8f0;
  --white:#ffffff;
  --text:#0d2137;
  --muted:#5a7292;
  --border:#d1dce8;
  --bg:#eef3f9;
  --card:#ffffff;
  --shadow-sm:0 2px 8px rgba(13,33,55,0.08);
  --shadow-md:0 6px 24px rgba(13,33,55,0.13);
  --shadow-lg:0 12px 40px rgba(13,33,55,0.18);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ─── HERO ─── */
.hero{
  background:var(--navy);
  position:relative;
  overflow:hidden;
  padding:0 0 0 0;
}
.hero-pattern{
  position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(37,99,168,0.25) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(201,150,58,0.15) 0%, transparent 40%),
    repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
  pointer-events:none;
}
.hero-top{
  display:flex;align-items:center;gap:0;
  padding:0;
}
.hero-stripe{
  background:var(--gold);
  width:8px;
  align-self:stretch;
  flex-shrink:0;
}
.hero-content{
  padding:40px 40px 36px;
  flex:1;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,150,58,0.15);
  border:1px solid rgba(201,150,58,0.4);
  color:var(--gold2);
  font-size:12px;font-weight:600;letter-spacing:0.05em;
  padding:5px 14px;border-radius:20px;
  margin-bottom:18px;
}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--gold2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.4);}}
.hero h1{
  font-family:'Kanit',sans-serif;
  font-size:clamp(20px,3vw,30px);
  font-weight:700;
  color:#fff;
  line-height:1.3;
  margin-bottom:8px;
}
.hero h2{
  font-family:'Kanit',sans-serif;
  font-size:clamp(14px,2vw,18px);
  font-weight:400;
  color:rgba(255,255,255,0.65);
  margin-bottom:24px;
}
.hero-stats{
  display:flex;gap:32px;flex-wrap:wrap;
}
.hero-stat{
  color:rgba(255,255,255,0.9);
}
.hero-stat-num{
  font-family:'Kanit',sans-serif;font-size:28px;font-weight:700;color:var(--gold2);line-height:1;
}
.hero-stat-label{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px;}
.hero-logo{
  padding:40px 40px 40px 0;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-circle{
  width:96px;height:96px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(201,150,58,0.5);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.logo-circle::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px dashed rgba(201,150,58,0.25);
  animation:spin 20s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.logo-inner{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--navy3),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Kanit',sans-serif;font-size:11px;font-weight:700;
  color:#fff;text-align:center;line-height:1.3;padding:8px;
}

/* ─── NAV BAR ─── */
.navbar{
  background:var(--navy2);
  border-bottom:2px solid var(--gold);
  padding:0 32px;
  display:flex;align-items:center;gap:4px;
  overflow-x:auto;
  scrollbar-width:none;
}
.navbar::-webkit-scrollbar{display:none;}
.nav-tab{
  padding:14px 18px;
  font-family:'Kanit',sans-serif;font-size:13px;font-weight:500;
  color:rgba(255,255,255,0.6);
  border:none;background:transparent;cursor:pointer;
  white-space:nowrap;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:all .2s;
}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,0.05);}
.nav-tab.active{color:var(--gold2);border-bottom-color:var(--gold);}

/* ─── MAIN ─── */
.main{max-width:1100px;margin:0 auto;padding:32px 24px 60px;}

/* search + add bar */
.toolbar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;
}
.search-wrap{
  flex:1;min-width:200px;
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:0 16px;
  box-shadow:var(--shadow-sm);
}
.search-wrap svg{width:16px;height:16px;fill:var(--muted);flex-shrink:0;}
.search-wrap input{
  border:none;outline:none;
  font-family:'Sarabun',sans-serif;font-size:14px;
  background:transparent;padding:11px 0;flex:1;color:var(--text);
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border-radius:10px;border:none;
  font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,150,58,0.4);}
.btn-navy{background:var(--navy2);color:#fff;}
.btn-navy:hover{background:var(--navy3);transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--navy2);border:1.5px solid var(--navy3);}
.btn-outline:hover{background:var(--navy2);color:#fff;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;}
.btn-danger-sm{background:#fff0f0;color:#c62828;border:1.5px solid #ffcdd2;padding:7px 12px;font-size:12px;border-radius:8px;border-width:1.5px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;transition:all .2s;}
.btn-danger-sm:hover{background:#c62828;color:#fff;border-color:#c62828;}

/* ─── SECTION HEADER ─── */
.section-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:2px solid var(--border);
}
.section-head.hidden{display:none;}
.section-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.section-title{
  font-family:'Kanit',sans-serif;font-size:18px;font-weight:600;color:var(--navy);
}
.section-count{
  background:var(--bg);border:1px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:600;
  padding:2px 10px;border-radius:20px;
}

/* ─── GRID ─── */
.section-block{margin-bottom:36px;}
.section-block.hidden{display:none;}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
}

/* ─── LINK CARD ─── */
.lcard{
  background:var(--card);
  border-radius:var(--r);
  border:1.5px solid var(--border);
  padding:0;
  transition:all .25s;
  overflow:hidden;
  position:relative;
  animation:fadeUp .4s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.lcard:hover{
  box-shadow:var(--shadow-md);
  transform:translateY(-3px);
  border-color:var(--sky);
}
.lcard-accent{height:4px;background:linear-gradient(90deg,var(--navy2),var(--sky));}
.lcard-body{padding:16px 18px 14px;}
.lcard-cat{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;letter-spacing:0.04em;
  padding:3px 10px;border-radius:20px;margin-bottom:10px;
}
.lcard-name{
  font-family:'Kanit',sans-serif;font-size:15px;font-weight:600;
  color:var(--navy);margin-bottom:4px;line-height:1.4;
}
.lcard-url{
  font-size:11.5px;color:var(--muted);
  word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:8px;
}
.lcard-note{
  font-size:12px;color:var(--muted);
  background:var(--bg);border-radius:6px;
  padding:5px 10px;margin-bottom:12px;line-height:1.5;
}
.lcard-foot{
  padding:10px 18px 14px;
  display:flex;gap:7px;align-items:center;
  border-top:1px solid var(--border);
  background:var(--bg);
}
.btn-open-card{
  background:linear-gradient(135deg,var(--navy2),var(--blue));
  color:#fff;padding:7px 16px;border-radius:8px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Sarabun',sans-serif;
  transition:all .2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;
}
.btn-open-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,73,118,0.35);}
.btn-edit-card{
  background:#fff;color:var(--navy2);border:1.5px solid var(--border);
  padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:500;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .2s;
}
.btn-edit-card:hover{background:var(--navy2);color:#fff;border-color:var(--navy2);}

/* ─── COLOR MAP ─── */
.cat-0{background:#e8f0fb;color:#1a4a8a;}
.cat-1{background:#e6f7f0;color:#155a38;}
.cat-2{background:#fef3e2;color:#7a4e00;}
.cat-3{background:#fce8ee;color:#8c1a38;}
.cat-4{background:#ede8fc;color:#4a2a88;}
.cat-5{background:#e2f6fb;color:#0e4f65;}
.cat-6{background:#fff0e0;color:#7a3e00;}
.cat-7{background:#e8fce8;color:#1a5a1a;}
.dot-0{background:#2563a8;}.dot-1{background:#16a34a;}.dot-2{background:#d97706;}
.dot-3{background:#db2777;}.dot-4{background:#7c3aed;}.dot-5{background:#0891b2;}
.dot-6{background:#ea580c;}.dot-7{background:#15803d;}

/* ─── EMPTY ─── */
.empty-state{
  text-align:center;padding:48px;color:var(--muted);grid-column:1/-1;
}
.empty-state svg{width:48px;height:48px;fill:var(--border);margin:0 auto 12px;display:block;}

/* ─── MODAL ─── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(13,33,55,0.55);backdrop-filter:blur(3px);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{
  background:#fff;border-radius:18px;padding:28px;
  width:100%;max-width:500px;
  box-shadow:var(--shadow-lg);
  border-top:4px solid var(--gold);
}
.modal h3{
  font-family:'Kanit',sans-serif;font-size:20px;font-weight:600;
  color:var(--navy);margin-bottom:22px;
}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
.form-group input,.form-group select{
  width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:10px 14px;font-family:'Sarabun',sans-serif;font-size:14px;
  color:var(--text);outline:none;background:#fff;transition:border .2s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--navy3);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--navy);color:#fff;
  padding:12px 22px;border-radius:12px;font-size:14px;
  font-family:'Sarabun',sans-serif;z-index:999;
  opacity:0;transform:translateY(16px);transition:all .3s;pointer-events:none;
  border-left:4px solid var(--gold);
}
.toast.show{opacity:1;transform:translateY(0);}

/* ─── FOOTER ─── */
.footer{
  text-align:center;padding:20px;font-size:12px;color:var(--muted);
  border-top:1px solid var(--border);margin-top:20px;
}

@media(max-width:600px){
  .hero-content{padding:28px 20px 24px;}
  .hero-logo{display:none;}
  .hero-stats{gap:20px;}
  .main{padding:20px 14px 48px;}
  .navbar{padding:0 16px;}
}
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <div class="hero-pattern"></div>
  <div class="hero-top">
    <div class="hero-stripe"></div>
    <div class="hero-content">
      <div class="hero-badge">กรมส่งเสริมสหกรณ์ • CPD</div>
      <h1>กลุ่มจัดตั้งและส่งเสริมสหกรณ์</h1>
      <h2>สำนักงานส่งเสริมสหกรณ์กรุงเทพมหานคร พื้นที่ 1</h2>
      <div class="hero-stats" id="heroStats">
        <div class="hero-stat">
          <div class="hero-stat-num" id="statTotal">0</div>
          <div class="hero-stat-label">ระบบงานทั้งหมด</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num" id="statCat">0</div>
          <div class="hero-stat-label">กลุ่มระบบ</div>
        </div>
      </div>
    </div>
    <div class="hero-logo">
      <div class="logo-circle">
        <div class="logo-inner">กจส.<br/>BKK1</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<div class="navbar" id="navbar">
  <button class="nav-tab active" data-cat="all" onclick="filterCat('all',this)">ทั้งหมด</button>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหาระบบงาน..." oninput="render()"/>
    </div>
    <button class="btn btn-gold" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      เพิ่มระบบ
    </button>
    <button class="btn btn-outline" onclick="exportCSV()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v-2H5z"/></svg>
      ส่งออก
    </button>
  </div>

  <div id="allSections"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">เพิ่มระบบงานใหม่</h3>
    <div class="form-group"><label>ชื่อระบบงาน *</label><input id="fName" placeholder="เช่น ระบบทะเบียนสหกรณ์"/></div>
    <div class="form-group"><label>URL *</label><input id="fUrl" placeholder="https://..."/></div>
    <div class="form-group">
      <label>กลุ่มระบบ</label>
      <input id="fCat" placeholder="เช่น ระบบสารสนเทศ, งานทะเบียน, การเงิน..."/>
    </div>
    <div class="form-group"><label>หมายเหตุ / คำอธิบาย</label><input id="fNote" placeholder="อธิบายการใช้งานโดยย่อ..."/></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-gold" onclick="saveLink()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        บันทึก
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  กลุ่มจัดตั้งและส่งเสริมสหกรณ์ (กจส.) • สำนักงานส่งเสริมสหกรณ์กรุงเทพมหานคร พื้นที่ 1 • กรมส่งเสริมสหกรณ์
</div>

<script>
const KEY = 'gjs_links_v1';
let links = [], editIdx = -1, activeCat = 'all';

// ── ข้อมูลระบบงาน กจส. เริ่มต้น ──
const defaultLinks = [
  // ระบบสารสนเทศกลาง
  {name:'ระบบสารสนเทศสหกรณ์ (CIS)', url:'https://cis.cpd.go.th', cat:'ระบบสารสนเทศ', note:'ระบบข้อมูลสารสนเทศกลางของกรมส่งเสริมสหกรณ์'},
  {name:'ระบบ e-Service กรมส่งเสริมสหกรณ์', url:'https://cpd.go.th', cat:'ระบบสารสนเทศ', note:'เว็บไซต์หลักกรมส่งเสริมสหกรณ์'},
  {name:'ระบบรายงานผล CPD Report', url:'https://cpd.go.th/report', cat:'ระบบสารสนเทศ', note:'ระบบรายงานผลการดำเนินงาน'},
  // ทะเบียนและกฎหมาย
  {name:'ระบบทะเบียนสหกรณ์', url:'https://ereg.cpd.go.th', cat:'งานทะเบียน', note:'จดทะเบียน แก้ไขทะเบียน ยุบเลิกสหกรณ์'},
  {name:'ระบบทะเบียนกลุ่มเกษตรกร', url:'https://ereg.cpd.go.th/farmer', cat:'งานทะเบียน', note:'ทะเบียนกลุ่มเกษตรกรและกลุ่มอาชีพ'},
  {name:'ระบบตรวจสอบสถานะนิติบุคคล', url:'https://www.dbd.go.th', cat:'งานทะเบียน', note:'กรมพัฒนาธุรกิจการค้า'},
  // ส่งเสริมและพัฒนา
  {name:'ระบบแผนพัฒนาสหกรณ์', url:'https://plan.cpd.go.th', cat:'ส่งเสริมและพัฒนา', note:'บันทึกและติดตามแผนพัฒนาสหกรณ์'},
  {name:'ระบบติดตามผลการส่งเสริม', url:'https://monitor.cpd.go.th', cat:'ส่งเสริมและพัฒนา', note:'ติดตามผลการส่งเสริมสหกรณ์รายแห่ง'},
  {name:'ระบบ e-Learning กรมส่งเสริมสหกรณ์', url:'https://elearning.cpd.go.th', cat:'ส่งเสริมและพัฒนา', note:'ฝึกอบรมออนไลน์สำหรับเจ้าหน้าที่และสมาชิก'},
  // การเงิน-บัญชี
  {name:'ระบบบัญชีสหกรณ์ (e-Accounting)', url:'https://eacc.cpd.go.th', cat:'การเงินและบัญชี', note:'ระบบบัญชีมาตรฐานสหกรณ์'},
  {name:'ระบบวิเคราะห์ฐานะการเงินสหกรณ์', url:'https://fms.cpd.go.th', cat:'การเงินและบัญชี', note:'วิเคราะห์งบการเงินสหกรณ์'},
  {name:'GFMIS ระบบบริหารการเงินการคลัง', url:'https://gfmis.go.th', cat:'การเงินและบัญชี', note:'ระบบการเงินการคลังภาครัฐ'},
  // ระบบภายใน
  {name:'ระบบสารบรรณอิเล็กทรอนิกส์', url:'https://saraban.cpd.go.th', cat:'ระบบภายใน', note:'รับ-ส่งหนังสือราชการ'},
  {name:'ระบบบริหารงานบุคคล (DPIS)', url:'https://dpis.ocsc.go.th', cat:'ระบบภายใน', note:'ระบบสารสนเทศทรัพยากรบุคคลภาครัฐ'},
  {name:'ระบบ Smart Office', url:'https://smartoffice.cgd.go.th', cat:'ระบบภายใน', note:'ระบบงานสำนักงาน'},
  // ข้อมูลและรายงาน
  {name:'ระบบข้อมูลสหกรณ์ภาคเกษตร', url:'https://agri.cpd.go.th', cat:'ข้อมูลและรายงาน', note:'สถิติสหกรณ์การเกษตร'},
  {name:'Open Data กรมส่งเสริมสหกรณ์', url:'https://data.cpd.go.th', cat:'ข้อมูลและรายงาน', note:'ชุดข้อมูลเปิดภาครัฐ'},
  {name:'ระบบ GIS แผนที่สหกรณ์', url:'https://gis.cpd.go.th', cat:'ข้อมูลและรายงาน', note:'แผนที่สหกรณ์ทั่วประเทศ'},
];

const CAT_COLORS = ['cat-0','cat-1','cat-2','cat-3','cat-4','cat-5','cat-6','cat-7'];
const DOT_COLORS = ['dot-0','dot-1','dot-2','dot-3','dot-4','dot-5','dot-6','dot-7'];
let catColorMap = {};
let catIdx = 0;

function getCatClass(cat) {
  if (!cat) return 'cat-0';
  if (!catColorMap[cat]) { catColorMap[cat] = catIdx++ % 8; }
  return CAT_COLORS[catColorMap[cat]];
}
function getDotClass(cat) {
  if (!cat) return 'dot-0';
  if (catColorMap[cat] === undefined) getCatClass(cat);
  return DOT_COLORS[catColorMap[cat]];
}

function load() {
  try { const d = localStorage.getItem(KEY); links = d ? JSON.parse(d) : [...defaultLinks]; }
  catch(e) { links = [...defaultLinks]; }
  // rebuild color map
  catColorMap = {}; catIdx = 0;
  links.forEach(l => { if(l.cat) getCatClass(l.cat); });
}
function save() { localStorage.setItem(KEY, JSON.stringify(links)); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function categories() { return [...new Set(links.map(l => l.cat).filter(Boolean))]; }

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function buildNavbar() {
  const cats = categories();
  const nb = document.getElementById('navbar');
  nb.innerHTML = `<button class="nav-tab ${activeCat==='all'?'active':''}" data-cat="all" onclick="filterCat('all',this)">ทั้งหมด</button>`;
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (activeCat===cat?' active':'');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = function(){ filterCat(cat, this); };
    nb.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = links.filter(l => {
    const matchQ = !q || (l.name||'').toLowerCase().includes(q) || (l.url||'').toLowerCase().includes(q) || (l.note||'').toLowerCase().includes(q);
    const matchCat = activeCat === 'all' || l.cat === activeCat;
    return matchQ && matchCat;
  });

  buildNavbar();
  document.getElementById('statTotal').textContent = links.length;
  document.getElementById('statCat').textContent = categories().length;

  const cats = activeCat === 'all'
    ? [...new Set(filtered.map(l => l.cat || '(ไม่มีกลุ่ม)'))]
    : [activeCat];

  const container = document.getElementById('allSections');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state" style="padding:64px;text-align:center;color:var(--muted)"><svg viewBox="0 0 24 24" width="52" height="52" fill="var(--border)"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg><p style="margin-top:12px">ไม่พบระบบงานที่ตรงกัน</p></div>`;
    return;
  }

  container.innerHTML = cats.map(cat => {
    const items = filtered.filter(l => (l.cat||'(ไม่มีกลุ่ม)') === cat);
    if (!items.length) return '';
    const dotCls = getDotClass(cat);
    const catCls = getCatClass(cat);
    return `
    <div class="section-block">
      <div class="section-head">
        <div class="section-dot ${dotCls}"></div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length} ระบบ</div>
      </div>
      <div class="card-grid">
        ${items.map(l => {
          const ri = links.indexOf(l);
          return `<div class="lcard">
            <div class="lcard-accent"></div>
            <div class="lcard-body">
              <div class="lcard-cat ${catCls}">${l.cat||'ทั่วไป'}</div>
              <div class="lcard-name">${l.name||'(ไม่มีชื่อ)'}</div>
              <div class="lcard-url">${l.url||''}</div>
              ${l.note?`<div class="lcard-note">${l.note}</div>`:''}
            </div>
            <div class="lcard-foot">
              <a class="btn-open-card" href="${l.url}" target="_blank" rel="noopener">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                เข้าสู่ระบบ
              </a>
              <button class="btn-edit-card" onclick="openEdit(${ri})">แก้ไข</button>
              <button class="btn-danger-sm" onclick="deleteLink(${ri})" style="margin-left:auto">ลบ</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function openAdd() {
  editIdx = -1;
  document.getElementById('modalTitle').textContent = 'เพิ่มระบบงานใหม่';
  ['fName','fUrl','fCat','fNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalBg').classList.add('open');
}
function openEdit(i) {
  editIdx = i;
  const l = links[i];
  document.getElementById('modalTitle').textContent = 'แก้ไขระบบงาน';
  document.getElementById('fName').value = l.name||'';
  document.getElementById('fUrl').value = l.url||'';
  document.getElementById('fCat').value = l.cat||'';
  document.getElementById('fNote').value = l.note||'';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function saveLink() {
  const name = document.getElementById('fName').value.trim();
  const url  = document.getElementById('fUrl').value.trim();
  if (!name||!url) { alert('กรุณากรอกชื่อระบบและ URL'); return; }
  const obj = {name, url, cat:document.getElementById('fCat').value.trim(), note:document.getElementById('fNote').value.trim()};
  if (editIdx>=0) links[editIdx]=obj; else links.push(obj);
  save(); closeModal(); render();
  toast(editIdx>=0 ? 'แก้ไขข้อมูลเรียบร้อย ✓' : 'เพิ่มระบบงานเรียบร้อย ✓');
}
function deleteLink(i) {
  if (!confirm(`ต้องการลบ "${links[i].name}" ออกจากรายการ?`)) return;
  links.splice(i,1); save(); render(); toast('ลบรายการเรียบร้อย');
}
function exportCSV() {
  const rows = [['ชื่อระบบงาน','URL','กลุ่มระบบ','หมายเหตุ'], ...links.map(l=>[l.name,l.url,l.cat,l.note])];
  const csv  = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'gjs_links.csv'; a.click();
  toast('ส่งออก CSV เรียบร้อย');
}
document.getElementById('modalBg').addEventListener('click', e => { if(e.target===document.getElementById('modalBg')) closeModal(); });

load(); render();
</script>
</body>
</html>
